<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        min-height: 100vh;
        background: #f8fafc;
        color: #0f172a;
        transition: background-color 0.25s ease, color 0.2s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
    }


    h1 {
        font-size: 2.8rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #1e293b, #3b82f6);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        display: inline-block;
    }

    button {
        background: #1e293b;
        border: none;
        padding: 0.85rem 1.8rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 60px;
        color: white;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: inherit;
    }

    .dark-btn {
        background: #0f172a;
        border: 1px solid #334155;
    }

    .light-btn {
        background: #e2e8f0;
        color: #0f172a;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    .random-btn {
        background: linear-gradient(95deg, #8b5cf6, #d946ef);
    }

    .toss-btn {
        background: #2dd4bf;
        color: #0f172a;
    }

    button {
        padding: 0.65rem 1.3rem;
        font-size: 0.85rem;
    }

    h1 {
        font-size: 2.2rem;
    }






    button-panel {

        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
        margin: 1.5rem 0 1.2rem;
    }
</style>

<body>




    <h1>🎨 COLOR STUDIO</h1> <br>


    <div class="button-panel">

        <button>🌙 Dark Mode</button>
        <button class="light">☀️ Light Mode</button>

        <button class="color ">🎲 Random BG </button>

        <button class="toss">Win/Lose</button>

    </div>

    <!-- <h1 class="ball">⚽ </h1> -->
     <hr>
     <br>


    

    



</body>
<script>

    const buttons = document.querySelectorAll("button")
    let headtwo = document.querySelector("h2")


    let headone = document.querySelector("h1")
    console.log(headone);


    let btn = document.querySelector("button ")
    btn.addEventListener("click", () => {
        document.body.style.backgroundColor = "black"
        document.body.style.color = "white"


    })

    let light = document.querySelector(".light")
    light.addEventListener("click", () => {
        document.body.style.backgroundColor = "white"
        document.body.style.color = "black"
    });

    console.log(Math.ceil(Math.random() * 100));
    let color = document.querySelector(".color")
    color.addEventListener("click", () => {
        document.body.style.backgroundColor = `rgb(${Math.ceil(Math.random() * 255)},
         ${Math.ceil(Math.random() * 255)},
          ${Math.ceil(Math.random() * 255)})`

        document.body.style.color = `rgb(${Math.ceil(Math.random() * 255)}, 
        ${Math.ceil(Math.random() * 255)}, 
        ${Math.ceil(Math.random() * 255)})`
    })




    let toss = document.querySelector(".toss")
    toss.addEventListener("click", () => {
        let random = Math.ceil(Math.random() * 2)
        if (random === 1) {
            alert("wins 🎉")
        } else {
            alert("lose 😢")
        }





    })

    let ball = document.querySelector("h1.ball")
    ball.addEventListener("click", (e) => {
        ball.style.paddingTop = `${e.y}px`
        ball.style.paddingLeft = `${e.x}px`
        console.log(e.x);
        console.log(e.y);





    });

</script>

</html>
